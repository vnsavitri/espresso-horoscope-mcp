<?xml version="1.0" encoding="UTF-8"?>
<svg id="cardRoot" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 1024" width="768" height="1024">
  <!-- Colors -->
  <defs>
    <style>
      :root {
        --bg: #111936;         /* page background (outside the card) */
        --card: #141b3a;       /* card background */
        --text: #E6E6F0;       /* main text */
        --accent: #bdac82;     /* gold accent */
        --star: #9C84F4;       /* purple stars */
      }
      .text { fill: var(--text); font-family: Teko, system-ui, -apple-system, Segoe UI, Roboto, Arial; }
      .small { font-size: 16px; }
      .body { font-size: 20px; }
      .stat { font-size: 28px; font-weight: 600; }
      .title { font-size: 48px; font-weight: 500; }
      .subtitle { font-size: 22px; font-style: italic; opacity: .8; }
    </style>
    <!-- Star shape (Monument Valley vibe) -->
    <symbol id="mvStar" viewBox="-1 -1 2 2" overflow="visible">
      <path d="M0 -1 Q .35 -.35 1 0 Q .35 .35 0 1 Q -.35 .35 -1 0 Q -.35 -.35 0 -1Z" fill="var(--star)"/>
    </symbol>
  </defs>

  <!-- Card background -->
  <rect x="0" y="0" width="768" height="1024" rx="16" fill="var(--card)"/>
  <!-- hairline border like PNG -->
  <rect x="10" y="10" width="748" height="1004" rx="14" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <!-- Decorative stars (positions tuned to PNG) -->
  <g id="stars" opacity="0.9">
    <use href="#mvStar" transform="translate(160 160) scale(18)"/>
    <use href="#mvStar" transform="translate(290 120) scale(10)"/>
    <use href="#mvStar" transform="translate(560 170) scale(24)"/>
    <use href="#mvStar" transform="translate(640 360) scale(22)"/>
    <use href="#mvStar" transform="translate(220 740) scale(18)"/>
    <use href="#mvStar" transform="translate(560 820) scale(26)"/>
    <use href="#mvStar" transform="translate(200 480) scale(10)"/>
    <use href="#mvStar" transform="translate(470 420) scale(14)"/>
  </g>

  <!-- SIGN ICON SLOT (exact 128.5201 x 198.64) -->
  <!-- Position tuned to match PNG. The group is the frame you inject into. -->
  <g id="signIconSlot" transform="translate(319.74 130)">
    <!-- helper rect hidden: uncomment while aligning -->
    <!-- <rect width="128.5201" height="198.64" fill="none" stroke="#fff" opacity=".15"/> -->
    <!-- Place your sign SVG paths here (ensure they fit the slot or scale within another <g>) -->
  </g>

  <!-- SIGN LABEL -->
  <text id="signLabel" class="text" x="50%" y="352" font-size="28" letter-spacing="3" text-anchor="middle">ARIES</text>

  <!-- TITLE -->
  <text id="title" class="text title" x="50%" y="440" text-anchor="middle">Celestial Perfection</text>

  <!-- SUBTITLE -->
  <text id="subtitle" class="text subtitle" x="50%" y="470" text-anchor="middle">“Cosmic equilibrium found.”</text>

  <!-- HEADLINE STATS (left→right like PNG) -->
  <g id="stats" class="text stat">
    <text id="statRatio"    x="220" y="540" text-anchor="middle">2.10:1</text>
    <text id="statTime"     x="320" y="540" text-anchor="middle">28s</text>
    <text id="statPressure" x="420" y="540" text-anchor="middle">8.4 bar</text>
    <text id="statTemp"     x="520" y="540" text-anchor="middle">91.8 °C</text>
    <text id="statEY"       x="620" y="540" text-anchor="middle">0.00</text>
  </g>

  <!-- BULLETS (multiline center) -->
  <text id="bullets" class="text body" x="50%" y="590" text-anchor="middle">
    <tspan x="50%" dy="0">• Excellent shot parameters!</tspan>
    <tspan x="50%" dy="24">• Maintain current grid setting</tspan>
    <tspan x="50%" dy="24">• Keep consistent puck preparation</tspan>
  </text>

  <!-- NARRATIVE (gold accent, two lines like PNG) -->
  <text id="narrative" x="50%" y="780" text-anchor="middle" fill="var(--accent)" class="body">
    <tspan x="50%" dy="0">Your Aries energy transcends through this peaceful supernova,</tspan>
    <tspan x="50%" dy="24">creating cosmic harmony in every drop.</tspan>
  </text>

  <!-- META ROW -->
  <text id="meta" class="text small" x="50%" y="820" text-anchor="middle" opacity=".75">
    seed: b99addb6 • rule: sweet_spot • severity: perfect
  </text>

  <!-- FOOTER -->
  <text id="footer" class="text" x="50%" y="970" text-anchor="middle" font-size="18" opacity=".9">
    Espresso Horoscope
  </text>
</svg>
